<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local URL Shortener</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        h1 { color: #333; margin-bottom: 20px; font-size: 24px; }
        input[type="url"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #0056b3; }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #e9f5ff;
            border-radius: 6px;
            display: none;
            word-break: break-all;
        }
        .result-box a { color: #007bff; font-weight: bold; text-decoration: none; }
        .result-box a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <h1>Link Shortener</h1>
    <input type="url" id="longUrl" placeholder="Paste your long URL here..." required>
    <button onclick="shortenLink()">Shorten URL</button>

    <div class="result-box" id="resultBox">
        <p style="margin: 0 0 5px 0; color: #666; font-size: 14px;">Your short link:</p>
        <a id="shortLink" href="#" target="_blank"></a>
    </div>
</div>

<script>
    async function shortenLink() {
        const urlInput = document.getElementById('longUrl').value;
        const resultBox = document.getElementById('resultBox');
        const shortLink = document.getElementById('shortLink');

        if (!urlInput) {
            alert('Please enter a valid URL.');
            return;
        }

        try {
            const response = await fetch('/shorten', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: urlInput })
            });

            const data = await response.json();
            
            if (response.ok) {
                shortLink.href = data.short_url;
                shortLink.innerText = data.short_url;
                resultBox.style.display = 'block';
            } else {
                alert(data.error || 'Something went wrong.');
            }
        } catch (error) {
            alert('Could not connect to the server.');
        }
    }
</script>

</body>
</html>
